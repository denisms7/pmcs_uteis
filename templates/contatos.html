{% extends "base.html" %}

{% block conteudo %}

<div class="">
    <h2 class="mt-3 mb-5">CONTATOS</h2>

    {% for x in categoria %}

    <hr class="pesquisa mt-5 mb-5">
    <h2 class="pesquisa">{{ x }}</h2>

    <table class="table table-hover">

        <thead>
            <tr>
                <td style="width: 20em">SETOR:</td>
                <td class="text-center" style="width: 10em">CONTATO:</td>
                <td style="width: 20em">E-MAIL:</td>
            <tr>
        </thead>
        {% for item in df_contato.index %}

        <!-- {% if item[2] == x %} -->

        <tr class="pesquisa">
            <td>{{ df_contato["setor"][item] }}</td>
            <td class="text-center">{{ df_contato["setor"][item] }}</td>
            <td>{{ df_contato["setor"][email] }}</td>
        </tr>

        <!-- {% endif %} -->

        {% endfor %}


    </table>
    <br>
    <br>
    {% endfor %}

</div>

{% endblock %}
